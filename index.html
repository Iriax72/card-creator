<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Creator</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <main>
        <form action="">
            <select name="typeOfCard" id="typeOfCard-select">
                <option value="unit">UNITÉ</option>
                <option value="event">ÉVENEMENT</option>
                <option value="amelio">AMÉLIORATION</option>
            </select>
            <button type="sumbit" id="confirm-btn">CONFIRMER</button>
        </form>
        <div id="unit" class="card-div">
            <img src="./assets/unit.png" alt="image de base pour la carte"></img>
            <form action="" id="unit-form">
                <select name="zone" id="zone">
                    <option value="TERRESTRE">TERRESTRE</option>
                    <option value="SPATIAL">SPATIAL</option>
                </select>
                <input type="number" name="cout" value="3">
                <input type="text" name="titre" placeholder="Titre">
                <input type="image" name="art">
                <input type="number" name="degats" value="2">
                <input type="number" name="pv" value="1">
                <input type="text" name="motcle" placeholder="mots-clés">
                <input type="text" name="effet">
                <input type="text" name="artiste" placeholder="artiste">
                <input type="text" name="rarete" value="C">
                <input type="number" name="number" value="1">
                <input type="number" name="maxnum" value="252">
            </form>
        </div>
        <div id="event" class="card-div">
            <img src="./assets/event.png" alt="image de base pour la carte">
            <form action="" id="event-form">
                <input type="numer" name="cout" value="1">
                <input type="text" name="titre" placeholder="Titre">
                <input type="text" name="motcle" placeholder="mots-clés">
                <input type="text" name=effet>
                <input type="image" name="art">
                <input type="text" name="artiste" placeholder="ariste">
                <input type="text" name="rarete" value="C">
                <input type="number" name="number" placeholder="1">
                <input type="number" name="maxnum" placeholder="252">
            </form>
        </div>
        <div id="amelio" class="card-div">
            <img src="./assets/amelio.png" alt="image de base pour la carte">
            <form action="" id="amelio-form">
                <input type="number" name="cout" value="2">
                <input type="text" name="titre" placeholder="Titre">
                <input type="image" name="art">
                <input type="text" name="effet">
                <input type="number" name="degats" value="3">
                <input type="nunber" name="pv" value="1">
                <input type="text" name="motcle" placeholder="mots-clés">
                <input type="text" name="artiste" placeholder="artiste">
                <input type="text" name="rarete" value="C">
                <input type="number" name="number" value="1">
                <input type="number" name="maxnum" value="252">
            </form>
        </div>
        <a href="./index.html" download=""></a>
    </main>
</body>
</html>
