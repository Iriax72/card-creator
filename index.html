<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Creator</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./positions.css">
    <script src="./typeSelector.js" defer></script>
    <script src="./download.js" defer></script>
</head>
<body>
    <main>
        <form action="">
            <select name="typeOfCard" id="typeOfCard-select">
                <option value="unit">UNITÉ</option>
                <option value="event">ÉVENEMENT</option>
                <option value="amelio">AMÉLIORATION</option>
            </select>
            <button type="sumbit" id="confirm-btn">CONFIRMER</button>
        </form>
        <div id="unit" class="card-div">
            <img src="./assets/unit.png" alt="image de base pour la carte"></img>
            <form action="" method="post" id="unit-form">
                <select name="zone" id="zone-unit">
                    <option value="TERRESTRE">TERRESTRE</option>
                    <option value="SPATIAL">SPATIAL</option>
                </select>
                <input type="number" name="cout" value="3" id="cout" class="number-input">
                <input type="text" name="titre" placeholder="Titre" id="titre" class="text-input">
                <input type="image" name="art" id="art-unit">
                <input type="number" name="degats" value="2" id="degats-unit" class="number-input">
                <input type="number" name="pv" value="1" id="pv-unit" class="number-input">
                <input type="text" name="motcle" placeholder="mots-clés" id="motcle-unit" class="text-input">
                <input type="text" name="effet" id="effet-unit" class="text-input">
                <input type="text" name="artiste" placeholder="artiste" id="artiste" class="text-input">
                <input type="text" name="rarete" value="C" id="rarete" class="text-input">
                <input type="number" name="number" value="1" id="number" class="number-input">
                <input type="number" name="maxnum" value="252" id="maxnum" class="number-input">
                <button type="submit" id="unit-submit">TÉLÉCHARGER</button>
            </form>
        </div>
        <div id="event" class="card-div">
            <img src="./assets/event.png" alt="image de base pour la carte">
            <form action="" method="post" id="event-form">
                <input type="numer" name="cout" value="1" class="number-input">
                <input type="text" name="titre" placeholder="Titre" class="text-input">
                <input type="text" name="motcle" placeholder="mots-clés" class="text-input">
                <input type="text" name=effet class="text-input">
                <input type="image" name="art" class="image-input">
                <input type="text" name="artiste" placeholder="artiste" class="text-input">
                <input type="text" name="rarete" value="C" class="text-input">
                <input type="number" name="number" value="1" class="number-input">
                <input type="number" name="maxnum" value="252" class="number-input">
                <button type="submit" id="event-submit">TÉLÉCHARGER</button>
            </form>
        </div>
        <div id="amelio" class="card-div">
            <img src="./assets/amelio.png" alt="image de base pour la carte">
            <form action="" method="post" id="amelio-form">
                <input type="number" name="cout" value="2" class="number-input">
                <input type="text" name="titre" placeholder="Titre" class="text-input">
                <input type="image" name="art" class="image-input">
                <input type="text" name="effet" class="text-input">
                <input type="number" name="degats" value="3" class="number-input">
                <input type="number" name="pv" value="1" class="number-input">
                <input type="text" name="motcle" placeholder="mots-clés" class="text-input">
                <input type="text" name="artiste" placeholder="artiste" class="text-input">
                <input type="text" name="rarete" value="C" class="text-input">
                <input type="number" name="number" value="1" class="number-input">
                <input type="number" name="maxnum" value="252" class="number-input">
                <button type="submit" id="amelio-submit">TÉLÉCHARGER</button>
            </form>
        </div>
    </main>
</body>
</html>
